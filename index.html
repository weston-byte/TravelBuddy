<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Buddy — AI Travel Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  margin:0;padding:0;
  height:100%;
  background:#EDE8F2;
  font-family:'Manrope',system-ui,sans-serif;
  overflow:hidden;
  position:fixed;
  width:100%;
}
:root{
  --night:#F7F4F9;--panel:#FFFFFF;--panel2:#F0EBF4;--panel3:#E8E0EE;--line:#DDD5E5;
  --garnet:#C03546;--sap:#8E1F36;--amber:#D4880A;--cream:#1A0A20;
  --cdim:#3D2455;--muted:#7A6888;--mdim:#A090B0;--live:#0DAB8E;--blue:#2E7A9A;
}

/* The app shell uses dvh so the nav is always visible on mobile */
.app{
  width:100%;max-width:430px;
  position:fixed;
  top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  background:var(--night);
  display:flex;flex-direction:column;
  overflow:hidden;
}
@media(min-width:460px){
  .app{top:20px;bottom:20px;border-radius:28px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(140,31,54,.3);}
}

/* Body scroll area - flex:1 so it takes remaining space after header+nav */
#mainBody{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  min-height:0; /* critical: allows flex child to shrink below content size */
}

/* Map body variant - no padding, no scroll, fixed height via flex */
#mainBody.map-mode{
  overflow:visible;
  padding:0;
  display:flex;
  flex-direction:column;
}

button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:0;height:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes dotP{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes wave{0%,100%{height:5px}50%{height:22px}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.fadeIn{animation:fadeIn .35s ease both}
.rise{animation:rise .3s ease both}
.slideUp{animation:slideUp .45s ease both}
.d1{animation:dotP 1.4s ease-in-out infinite}
.d2{animation:dotP 1.4s ease-in-out .2s infinite}
.d3{animation:dotP 1.4s ease-in-out .4s infinite}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
button:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
[style*="font-weight:700"],[style*="font-weight:800"]{font-family:Syne,sans-serif;}
[style*='font-weight:700'],[style*='font-weight:800']{}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--line);cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--garnet);cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--garnet);border:none}
nav{flex-shrink:0 !important;position:relative;z-index:10;}
.leaflet-pane{z-index:4 !important;}
.leaflet-top,.leaflet-bottom{z-index:5 !important;}


/* Leaflet dark theme overrides */
.leaflet-container{background:#E8E4F0 !important;font-family:'Manrope',sans-serif !important}
.leaflet-popup-content-wrapper{background:#FFFFFF!important;border:1px solid var(--line)!important;border-radius:12px!important;color:var(--cream)!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important}
.leaflet-popup-content{margin:12px 14px!important;line-height:1.5!important}
.leaflet-popup-tip{background:#FFFFFF!important}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:18px!important;top:6px!important;right:8px!important}
.leaflet-control-zoom a{background:#FFFFFF!important;color:var(--cream)!important;border-color:var(--line)!important}
.leaflet-control-zoom a:hover{background:var(--panel2)!important}
.leaflet-control-attribution{background:rgba(255,255,255,.85)!important;color:var(--muted)!important;font-size:9px!important}
.leaflet-attribution-flag{display:none!important}
</style>
</head>

const REGIONS = [
  {id:"europe",  emoji:"🌍",label:"Europe",       cities:["lisbon","barcelona","amsterdam","berlin","paris","rome","istanbul","budapest","athens","porto","copenhagen","vienna","prague"]},
  {id:"asia",    emoji:"🌏",label:"Asia",          cities:["tokyo","osaka","seoul","bangkok","singapore","dubai","bali","hcmc","mumbai","hong_kong","taipei"]},
  {id:"americas",emoji:"🌎",label:"Americas",      cities:["cdmx","buenos_aires","new_york","montreal","rio","bogota","lima","cartagena","havana","new_orleans"]},
  {id:"caucasus",emoji:"🌏",label:"Caucasus",      cities:["tbilisi","yerevan","baku","almaty"]},

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function cityData(){ return S.cityKey ? (S.cityCache[S.cityKey] || null) : null; }
function spots(){ return (cityData()||{}).spots || []; }
function shownSpots(){ const a=spots(); return S.filter==="All"?a:a.filter(s=>s.type===S.filter); }
function spotTypes(){ const s=new Set(spots().map(x=>x.type)); return ["All",...Array.from(s)]; }
function meta(){ return S.cityKey ? (CITY_META[S.cityKey]||{}) : {}; }
function msgs(){ return S.msgs[S.activeGroup]||[]; }
function activeG(){ return S.groups.find(g=>g.id===S.activeGroup); }
function cityLang(){ return CITY_LANG[S.cityKey]||"local language"; }

// ── API ───────────────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens=1000){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  const d = await res.json();
  if(!res.ok){ const msg=(d&&d.error&&d.error.message)||"HTTP "+res.status; throw new Error(msg); }
  return (d.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
function r(){
  const app = document.getElementById("app");
  if(!app) return;

  if(S.cityLoading){ app.innerHTML = renderCityLoading(); return; }
  if(!S.started){    app.innerHTML = renderOnboard();     return; }
  if(S.transOpen){   app.innerHTML = renderTranslator();  return; }
  if(S.showPicker){  app.innerHTML = renderPicker();      return; }

  app.innerHTML = renderMain();
  // Apply map-mode class AFTER innerHTML is set
  const body = document.getElementById("mainBody");
  if(body) body.className = S.tab === "map" ? "map-mode" : "";

  bindAfterRender();
}

// ── ONBOARDING ────────────────────────────────────────────────────────────────
function renderOnboard(){
  return `<div class="fadeIn" style="height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;background:var(--night);overflow-y:auto;">
    <div style="margin-bottom:16px;display:flex;gap:6px;align-items:center;">
      <span style="color:var(--line);font-size:10px;">▸</span>
      <span style="color:var(--garnet);font-size:20px;">✦</span>
      <span style="color:var(--line);font-size:10px;">▸</span>
    </div>
    <div class="slideUp" style="text-align:center;margin-bottom:6px;">
      <div style="font-weight:800;font-size:46px;color:var(--cream);line-height:1;">Buddy</div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-top:5px;">AI Travel Companion</div>
    </div>
    <div class="slideUp" style="font-size:12px;color:var(--garnet);margin-bottom:30px;letter-spacing:.06em;animation-delay:.08s;">Pick a city. Build your night.</div>

    ${[["🗺","Real interactive maps","OpenStreetMap with live venue pins"],["🌐","AI Translator","Speech-to-text, auto-detects language"],["✨","Vibe matching","Tell Buddy what you want tonight"],["👟","Step counter","Device motion integration"],["✉","Group travel","Chat & share spots with your crew"]].map(([ic,ti,de],i)=>`
      <div class="slideUp" style="display:flex;gap:12px;align-items:flex-start;margin-bottom:11px;width:100%;animation-delay:${.14+i*.06}s;">
        <div style="width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);display:grid;place-items:center;flex-shrink:0;font-size:15px;">${ic}</div>
        <div><div style="font-weight:700;font-size:13px;color:var(--cream);">${ti}</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">${de}</div></div>
      </div>`).join("")}

    <div style="width:100%;margin-top:10px;">
      <input id="nameInput" placeholder="Your name (optional)" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--cream);font-size:14px;margin-bottom:10px;"/>
      <button onclick="startApp()" style="width:100%;padding:15px 0;border-radius:14px;border:none;background:linear-gradient(90deg,var(--sap),var(--garnet));color:#FFFFFF;font-weight:800;font-size:16px;cursor:pointer;letter-spacing:.02em;">Let's go →</button>
    </div>
    <div style="margin-top:14px;font-size:10px;color:var(--mdim);letter-spacing:.14em;text-transform:uppercase;">Buddy v2</div>
  </div>`;
}

function startApp(){
  const n = document.getElementById("nameInput");
  S.username = (n && n.value.trim()) ? n.value.trim() : "Traveller";
  S.started = true;
  if(typeof DeviceMotionEvent !== "undefined" && DeviceMotionEvent.requestPermission){
    DeviceMotionEvent.requestPermission().catch(()=>{});
  }
  window.addEventListener("devicemotion", handleMotion, {passive:true});
  r();
}

// ── CITY LOADING ──────────────────────────────────────────────────────────────
function renderCityLoading(){
  const m = CITY_META[S.cityLoading] || {};
  return `<div class="fadeIn" style="height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:var(--night);">
    <div style="font-size:52px;margin-bottom:14px;">${m.flag||"🌍"}</div>
    <div style="font-weight:800;font-size:22px;color:var(--cream);margin-bottom:6px;">${m.name||"..."}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">${S.cityLoadError ? "Couldn't load — check connection" : "Building your city guide…"}</div>
    ${S.cityLoadError
      ? `<button onclick="retryCityLoad()" style="padding:11px 28px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--sap),var(--garnet));color:#FFFFFF;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:10px;">Retry</button>
         <button onclick="cancelCityLoad()" style="padding:8px 20px;border-radius:999px;border:1px solid var(--line);background:none;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;">← Back</button>`
      : `<div style="display:flex;gap:8px;">
          <span class="d1" style="width:9px;height:9px;border-radius:50%;background:var(--garnet);display:block;"></span>
          <span class="d2" style="width:9px;height:9px;border-radius:50%;background:var(--amber);display:block;"></span>
          <span class="d3" style="width:9px;height:9px;border-radius:50%;background:var(--live);display:block;"></span>
        </div>
        <div style="margin-top:16px;font-size:11px;color:var(--mdim);letter-spacing:.08em;">~15 seconds · powered by Claude</div>`
    }
  </div>`;
}

function retryCityLoad(){ S.cityLoadError = false; switchCity(S.cityLoading); }
function cancelCityLoad(){ S.cityLoading = null; S.cityLoadError = false; r(); }

// ── CITY PICKER ───────────────────────────────────────────────────────────────
function renderPicker(){
  return '<div class="fadeIn" style="height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--night);">'

    // Header
    +'<div style="padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--panel);">'
    +'<div><div style="font-weight:800;font-size:18px;color:var(--cream);">Where to?</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:2px;">Search any city or pick from the list</div></div>'
    +'<button onclick="S.showPicker=false;r()" style="background:none;border:none;color:var(--muted);font-size:28px;line-height:1;padding:0 4px;">×</button>'
    +'</div>'

    // Search bar — oninput does NOT call r()
    +'<div style="padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--panel);">'
    +'<div style="display:flex;gap:8px;">'
    +'<input id="citySearchInput" value="'+escH(S.citySearch)+'" placeholder="Search any city — Tokyo, Medellín, Reykjavík…" oninput="S.citySearch=this.value" onkeydonkeydown="handleSearchKey(event)"" style="flex:1;background:var(--panel2);border:1px solid '+(S.citySearchError?'#C03546':'var(--line)')+';border-radius:999px;padding:10px 16px;color:var(--cream);font-size:13.5px;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>'
    +'<button id="citySearchBtn" onclick="searchCity()" style="flex-shrink:0;background:'+(S.citySearchLoading?'var(--panel2)':'linear-gradient(90deg,var(--sap),var(--garnet))')+';border:none;border-radius:999px;padding:0 18px;color:'+(S.citySearchLoading?'var(--muted)':'#FFFFFF')+';font-weight:700;font-size:13px;cursor:pointer;min-width:80px;">'+(S.citySearchLoading?'…':'Search')+'</button>'

        var validCities = reg.cities.filter(function(k){ return !!CITY_META[k]; });

        return '<div style="margin-bottom:22px;">'
          +'<div style="font-size:10.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line);">'+reg.emoji+' '+reg.label+' \xb7 '+validCities.length+'</div>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">'
          + validCities.map(function(key){
              var m=CITY_META[key], curr=S.cityKey===key, loaded=!!(S.cityCache[key]||PRE[key]);
              return '<div data-citykey="'+key+'" onclick="pickCity(this)" style="background:'+(curr?'var(--panel2)':'var(--panel)')+';border:1px solid '+(curr?'var(--garnet)':'var(--line)')+';border-radius:12px;padding:10px 11px;cursor:pointer;">'
                +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">'

                +(!loaded&&!curr?'<span style="font-size:8px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:1px 5px;">AI</span>':'')
                +'</div>'

                +'</div>';
            }).join('')
          +'</div></div>';
      }).join('')
    +'</div>'
    +'</div>';
}

async function searchCity(){
  var q = S.citySearch.trim();
  if(!q || S.citySearchLoading) return;

  // Derive key from typed text — no API call needed
  var key = q.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim().replace(/\s+/g,'_').slice(0,30);

  // Register minimal metadata
  if(!CITY_META[key]){
    CITY_META[key] = {
      name: q.replace(/\b\w/g, function(c){ return c.toUpperCase(); }),
      country:'', flag:'🌍', currency:'', timezone:'', center:[0,0], tagline:''
    };
  }

  // Show loading state without destroying input
  var btn = document.getElementById('citySearchBtn');
  if(btn){ btn.textContent='…'; btn.style.background='var(--panel2)'; btn.style.color='var(--muted)'; }
  var area = document.getElementById('searchResultArea');
  if(area) area.innerHTML='<div style="margin-top:8px;padding:10px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;font-size:12.5px;color:var(--muted);">Building guide for <strong style="color:var(--cream);">'+escH(CITY_META[key].name)+'</strong>…</div>';

  S.citySearch=''; S.citySearchError=null;
  switchCity(key);
}

function handleSearchKey(e){
  if(e.key==='Enter'){ e.preventDefault(); searchCity(); }
}


function pickCity(el){
  var key = el.getAttribute('data-citykey');
  if(key) switchCity(key);
}


function clearSearch(){
  S.citySearch=''; S.citySearchError=null;
  var el=document.getElementById('citySearchInput');
  if(el){ el.value=''; el.focus(); }
  var area=document.getElementById('searchResultArea');
  if(area) area.innerHTML='';
}


function safeParseJSON(raw){
  if(!raw) return null;
  try{ return JSON.parse(raw); } catch(e){}
  let s = raw.trim();
  s = s.replace(/,\s*"[^"]*$/, '').replace(/:\s*"[^"]*$/, ':""').replace(/,\s*$/, '');
  let opens=0, arrs=0;
  for(const ch of s){if(ch==='{')opens++;else if(ch==='}')opens--;else if(ch==='[')arrs++;else if(ch===']')arrs--;}
  while(arrs-->0) s+=']'; while(opens-->0) s+='}';
  try{ return JSON.parse(s); } catch(e){ return null; }
}

async function switchCity(key){
  S.showPicker = false;
  if(S.cityCache[key]){ applyCity(key); r(); return; }
  if(PRE[key]){ S.cityCache[key]={...(CITY_META[key]||{}),...PRE[key]}; applyCity(key); r(); return; }
  // Start AI loading
  S.cityLoading = key;
  S.cityLoadError = false;
  r();
  try{
    const m = CITY_META[key];
    const raw = await callClaude(
      `Generate curated travel data for ${m.name}, ${m.country} for "Buddy" travel app.
Target: 25-35 year old travellers who love authentic nightlife, food, culture.
Return ONLY valid JSON with no markdown fences.

{
  "spots": [
    {"id":1,"name":"Real venue name","type":"Bar|Club|Food|Wine|Hang|View","area":"Neighbourhood","lat":0.0,"lng":0.0,"vibe":"2-3 sentence atmospheric insider description","rating":4.7,"heat":[45,65,80,75,50,20],"open":"19:00–02:00","price":"$$"}
  ],
  "plan": [
    {"day":"Day 1 — Title","items":[{"t":"10:00","what":"Specific activity","id":"x1a"}]}
  ]
}

Rules:
- 8-10 spots total, mix of types
- Real accurate lat/lng coordinates for ${m.name}
- heat array: 6 values [18:00,20:00,22:00,00:00,02:00,04:00] each 0-100
- Exactly 3 days in plan, 4-5 items each
- Unique item ids: x1a,x1b... x2a,x2b... x3a,x3b...`, 4000);
    const data = JSON.parse(raw);
    S.cityCache[key] = {...(CITY_META[key]||{}), ...data};
    applyCity(key);
    S.cityLoading = null;
    r();
  } catch(e){
    S.cityLoadError = true;
    r();
  }
}

function applyCity(key){

  S.filter = "All";
  S.mapFilter = "All";
  S.saved = [];
  S.done = [];
  S.vibeResult = null;
  S.vibeInput = "";
  S.itiResult = null;
  S.openSpot = null;
  S.mapInited = false;

function startListening(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    S.transHistory.push({dir:"in",original:"Speech recognition not available in this browser. Try Chrome on Android.",translated:"",detectedLang:"system"});
    r(); return;
  }
  const rec = new SR();
  rec.continuous = false; rec.interimResults = true; rec.lang = "en-US";
  S.recognition = rec; S.transListening = true; S.transInterim = "";
  rec.onresult = e => {
    let interim="", final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    S.transInterim = interim;
    if(final) processTranslation(final);
    r();
  };
  rec.onend = () => { S.transListening=false; S.transInterim=""; r(); };
  rec.onerror = () => { S.transListening=false; r(); };
  rec.start();
}
function stopListening(){ if(S.recognition) S.recognition.stop(); S.transListening=false; r(); }
async function processTranslation(text){
  S.transListening=false; S.transInterim=""; r();
  const lang = cityLang();
  try{
    const raw = await callClaude(`Translate this text. Detect language, translate appropriately.\nText: "${text}"\nIf English → translate to ${lang}. If not English → translate to English.\nReturn ONLY JSON: {"detectedLang":"English","direction":"out","translated":"translation here"}\ndirection: "out"=input was English, "in"=input was local language.`, 300);
    const d = JSON.parse(raw);
    S.transHistory.push({dir:d.direction||"out",original:text,translated:d.translated||"",detectedLang:d.detectedLang||"?"});
  } catch {
    S.transHistory.push({dir:"out",original:text,translated:"(translation failed)",detectedLang:"?"});
  }
  r();
  setTimeout(()=>{ const h=document.getElementById("transHistory"); if(h) h.scrollTop=h.scrollHeight; },60);
}

function initMap(){
  if(S.mapInited) return;
  const el = document.getElementById("leafletMap");
  if(!el || !window.L) return;
  if(el.offsetHeight < 10){
    const ro = new ResizeObserver((entries,obs)=>{ if(el.offsetHeight>=10){obs.disconnect();initMap();} });
    ro.observe(el);
    setTimeout(()=>{ if(!S.mapInited) initMap(); }, 400);
    return;
  }
  const m = meta();
  const center = (m.center && m.center[0]!==0) ? m.center : [41.6938,44.8015];
  try{
    const map = L.map("leafletMap",{zoomControl:true,attributionControl:true,tap:false}).setView(center,14);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      attribution:'&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
      subdomains:"abcd",maxZoom:20,detectRetina:true
    }).addTo(map);
    S.mapInstance=map; S.mapInited=true;
    placeMapPins(map);
    setTimeout(()=>{ if(S.mapInstance) S.mapInstance.invalidateSize(); },150);
    setTimeout(()=>{ if(S.mapInstance) S.mapInstance.invalidateSize(); },600);
  } catch(e){ console.error("Map init failed:",e); }

function placeMapPins(map){

    const isSaved = S.saved.includes(s.id);
    const sz = isSaved ? 18 : 13;
    const icon = L.divIcon({
      className:"",
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2px solid ${isSaved?"#E8A14C":"rgba(255,255,255,.25)"};box-shadow:0 0 ${h>75?10:5}px ${col}80;"></div>`,
      iconSize:[sz+4,sz+4], iconAnchor:[(sz+4)/2,(sz+4)/2]
    });
    const marker = L.marker([s.lat,s.lng],{icon}).addTo(map);
    marker.bindPopup(`<div style="min-width:150px;">

function renderPlan(){
  if(!S.cityKey) return renderNoCity("Your 3-day plan will appear here once you select a city.");
  const c = cityData();
  const plan = (c&&c.plan) ? c.plan : [];
  return `<div class="rise">
    <div style="font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">3-day plan · ${meta().name||"..."}</div>
    ${plan.map(d=>{
      const customItems = S.customPlanItems[d.day]||[];
      const allItems = [...d.items, ...customItems];
      const adding = S.addingPlan[d.day];
      return `<div style="margin-bottom:20px;">
        <div style="font-weight:700;font-size:14px;color:var(--amber);margin-bottom:8px;">${escH(d.day)}</div>
        ${allItems.map(it=>{
          const isDone = S.done.includes(it.id);
          const isCustom = customItems.some(ci=>ci.id===it.id);
          return`<div style="display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:6px;opacity:${isDone?.5:1};">
            <button onclick="toggleDone('${it.id}')" style="width:18px;height:18px;border-radius:6px;flex-shrink:0;margin-top:2px;border:1.5px solid ${isDone?"var(--live)":"var(--muted)"};background:${isDone?"var(--live)":"transparent"};color:var(--night);font-size:10px;font-weight:800;cursor:pointer;display:grid;place-items:center;">${isDone?"✓":""}</button>
            <div style="flex:1;min-width:0;"><span style="font-size:11.5px;color:var(--garnet);font-weight:700;margin-right:6px;">${it.t}</span><span style="font-size:13px;color:var(--cream);text-decoration:${isDone?"line-through":"none"};">${escH(it.what)}</span></div>
            <button onclick="removePlanItem(${JSON.stringify(d.day)},${JSON.stringify(it.id)},${isCustom})" style="background:none;border:none;color:var(--mdim);font-size:14px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;">×</button>
          </div>`;
        }).join("")}
        ${adding?`
          <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center;">
            <input placeholder="09:00" id="pt_${d.day.replace(/\W/g,'')}" style="width:64px;flex-shrink:0;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 8px;color:var(--cream);font-size:12px;"/>
            <input placeholder="Activity…" id="pw_${d.day.replace(/\W/g,'')}" onkeydown="if(event.key==='Enter')addPlanItem(${JSON.stringify(d.day)})" style="flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;color:var(--cream);font-size:12px;"/>
            <button onclick="addPlanItem(${JSON.stringify(d.day)})" style="background:var(--amber);border:none;border-radius:999px;padding:0 12px;height:34px;color:var(--night);font-weight:800;font-size:13px;flex-shrink:0;">+</button>
            <button onclick="S.addingPlan[${JSON.stringify(d.day)}]=false;r()" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;">×</button>
          </div>` :
          `<button onclick="S.addingPlan[${JSON.stringify(d.day)}]=true;r()" style="width:100%;padding:8px;border-radius:10px;border:1px dashed var(--line);background:transparent;color:var(--muted);font-size:12.5px;cursor:pointer;font-family:inherit;">+ Add activity</button>`}
      </div>`;
    }).join("")}
  </div>`;
}

function removePlanItem(day, id, isCustom){
  if(isCustom){
    if(S.customPlanItems[day]) S.customPlanItems[day]=S.customPlanItems[day].filter(i=>i.id!==id);
  } else {
    const c=cityData();
    if(c&&c.plan) c.plan.forEach(d=>{ if(d.day===day) d.items=d.items.filter(i=>i.id!==id); });
  }
  r();
}

function addPlanItem(day){
  const key = day.replace(/\W/g,'');
  const tEl = document.getElementById("pt_"+key);
  const wEl = document.getElementById("pw_"+key);
  const t = tEl ? tEl.value.trim() : "";
  const w = wEl ? wEl.value.trim() : "";
  if(!w) return;
  if(!S.customPlanItems[day]) S.customPlanItems[day]=[];
  S.customPlanItems[day].push({t:t||"?:00", what:w, id:"c_"+Date.now()});
  S.addingPlan[day]=false;
  r();
}

function sendMsg(){
  const t=S.draft.trim(); if(!t||!activeG()) return;
  const now=new Date();
  const stamp=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  if(!S.msgs[S.activeGroup]) S.msgs[S.activeGroup]=[];
  S.msgs[S.activeGroup].push({who:S.username,me:true,text:t,time:stamp});
  S.draft=""; r();
  setTimeout(()=>{ const ml=document.getElementById("msgList"); if(ml) ml.scrollTop=ml.scrollHeight; },60);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleSave(id){ S.saved=S.saved.includes(id)?S.saved.filter(x=>x!==id):[...S.saved,id]; r(); }
function toggleDone(id){ S.done=S.done.includes(id)?S.done.filter(x=>x!==id):[...S.done,id]; r(); }

function toggleSteps(){
  S.stepsActive = !S.stepsActive;
  if(S.stepsActive && typeof DeviceMotionEvent!=="undefined" && DeviceMotionEvent.requestPermission){
    DeviceMotionEvent.requestPermission()
      .then(p=>{ if(p==="granted") window.addEventListener("devicemotion",handleMotion,{passive:true}); })
      .catch(()=>{});
  }
  r();
}
function handleMotion(e){
  if(!S.stepsActive) return;
  const a = e.accelerationIncludingGravity; if(!a) return;
  const mag = Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
  const now = Date.now();
  if(S.lastAccMag!==null && mag>12 && (now-S.stepCooldown)>400){
    S.steps++;
    S.stepCooldown=now;
    // lightweight update: just the text nodes, not full re-render
    const stepEl = document.getElementById("stepCount");
    if(stepEl) stepEl.textContent = "👟 "+S.steps.toLocaleString();
  }
  S.lastAccMag = mag;
}

function createGroup(){
  const n = S.newGroup.trim(); if(!n) return;
  const id = Date.now();
  S.groups.push({id,name:n,members:[S.username||"You"],code:Math.random().toString(36).slice(2,7)});
  S.msgs[id]=[]; S.activeGroup=id; S.newGroup=""; r();
}
function delGroup(id){
  if(S.confirmDel!==id){ S.confirmDel=id; r(); return; }
  S.groups=S.groups.filter(g=>g.id!==id); delete S.msgs[id];
  if(S.activeGroup===id) S.activeGroup=S.groups[0]?.id||null;
  S.confirmDel=null; r();
}
function addMember(gid){
  const el=document.getElementById("mem_"+gid); const n=(el?.value||"").trim(); if(!n) return;
  S.groups=S.groups.map(g=>g.id===gid&&!g.members.includes(n)?{...g,members:[...g.members,n]}:g);
  r();
}
function remMember(gid,n){
  S.groups=S.groups.map(g=>g.id===gid?{...g,members:g.members.filter(m=>m!==n)}:g); r();
}
function shareGroup(id){
  const g=S.groups.find(x=>x.id===id); if(!g) return;
  const text=`Join my travel crew on Buddy!\nGroup: ${g.name} · Code: ${g.code}`;
  if(navigator.share) navigator.share({title:`Join ${g.name} on Buddy`,text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>{S.copiedId=id;r();setTimeout(()=>{S.copiedId=null;r();},2500);}).catch(()=>{});
}
function shareSpot(id){
  const s=spots().find(x=>x.id===id); if(!s) return;
  const m=meta();
  const text=`${s.name} — ${s.area}, ${m.name||""}\n${s.vibe.slice(0,100)}…`;
  if(navigator.share) navigator.share({title:s.name,text}).catch(()=>{});
  else navigator.clipboard.writeText(text).catch(()=>{});
}

async function matchVibe(){
  const v=S.vibeInput.trim(); if(!v||S.vibeLoading) return;
  S.vibeLoading=true; S.vibeResult=null; r();
  try{
    const raw=await callClaude(`You are a ${meta().name} nightlife expert. Match up to 5 spots to this vibe. Return ONLY valid JSON with no markdown.\nSpots:${JSON.stringify(spots().map(s=>({id:s.id,name:s.name,type:s.type,area:s.area,vibe:s.vibe})))}\nVibe:"${v}"\n{"summary":"one sentence vibe summary","matches":[{"id":1,"reason":"why this spot fits"}]}`);
    S.vibeResult=JSON.parse(raw);
  } catch { S.vibeResult={summary:"Couldn't read the vibe — try again.",matches:[]}; }
  S.vibeLoading=false; r();
}

async function genIti(){
  const sp=spots().filter(s=>S.saved.includes(s.id));
  if(!sp.length||S.itiLoading) return;
  S.itiLoading=true; S.itiResult=null; r();
  try{
    const raw=await callClaude(`You are a ${meta().name} night planner. Build a flowing evening itinerary from these saved spots. Food/drinks first, clubs last. Return ONLY valid JSON.\nSpots:${JSON.stringify(sp.map(s=>({id:s.id,name:s.name,type:s.type,area:s.area,open:s.open,vibe:s.vibe})))}\n{"title":"3-5 word catchy title","intro":"one sentence","stops":[{"id":1,"time":"19:00","tip":"insider tip for this stop"}]}`);
    S.itiResult=JSON.parse(raw);
  } catch { S.itiResult={title:"Try again",intro:"Something went wrong.",stops:[]}; }
  S.itiLoading=false; r();
}

// ── POST-RENDER BINDINGS ──────────────────────────────────────────────────────
function bindAfterRender(){
  if(S.tab==="map" && S.started && S.cityKey){
    requestAnimationFrame(()=>{ initMap(); setTimeout(initMap,200); setTimeout(initMap,600); });
  }
  if(S.tab==="chat"){
    setTimeout(()=>{ const ml=document.getElementById("msgList"); if(ml) ml.scrollTop=ml.scrollHeight; },60);
  }
}

// ── UTILITY ───────────────────────────────────────────────────────────────────
function escH(s){
  if(typeof s !== "string") return String(s||"");
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── BOOT ──────────────────────────────────────────────────────────────────────

function setFilter(btn, isMap){
  S.filter = btn.getAttribute("data-f");
  if(isMap) updateMapPins();
  else r();
}

r();
</script>
