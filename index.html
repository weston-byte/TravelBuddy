*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F0EBF8 !important;color:#1A0820 !important;font-family:'Manrope',system-ui,sans-serif;overflow:hidden;position:fixed;width:100%}
:root{
  --night:#FFFFFF;--panel:#F7F3FB;--panel2:#EDE8F4;--panel3:#E4DCEF;--line:#D8CEEA;
  --garnet:#C03546;--sap:#8E1F36;--amber:#C87800;--cream:#1A0820;
  --cdim:#3D2455;--muted:#7A6888;--mdim:#B0A0C0;--live:#0DAB8E;--blue:#2E7A9A;
  --sidebar-w:58px;--sidebar-open:200px;
}
/* APP SHELL */
.app{
  position:fixed;top:0;bottom:0;
  left:0;right:0;
  background:#FFFFFF !important;
  display:flex;flex-direction:column;
  overflow:hidden;
}
@media(min-width:500px){
  .app{box-shadow:0 0 40px rgba(0,0,0,.12);}
}

/* BOTTOM NAV */
.sidebar{
  display:none; /* hidden - replaced by bottom nav in renderMain */
}
/* top nav tabs - rendered inline by renderTopNav() */
.nav-item{border:none;background:none;cursor:pointer;}
.nav-item.active{color:var(--garnet);}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:9.5px;font-weight:700;letter-spacing:.06em;}

/* MAIN SCROLL */
#mainBody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0;padding:14px;}
#mainBody.map-mode{overflow:hidden;padding:0;display:flex;flex-direction:column;}

button{cursor:pointer;font-family:'Manrope',sans-serif;}
input,textarea{font-family:'Manrope',sans-serif;outline:none;}
::-webkit-scrollbar{width:0;height:0;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes dotP{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes wave{0%,100%{height:4px}50%{height:20px}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
.fadeIn{animation:fadeIn .35s ease both}
.rise{animation:rise .3s ease both}
.slideUp{animation:slideUp .45s ease both}
.d1{animation:dotP 1.4s ease-in-out infinite}
.d2{animation:dotP 1.4s ease-in-out .2s infinite}
.d3{animation:dotP 1.4s ease-in-out .4s infinite}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
@media(prefers-color-scheme:dark){:root{color-scheme:light;}}
button:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--line);cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--garnet);cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--garnet);border:none}
[style*="font-weight:700"],[style*="font-weight:800"]{font-family:Syne,sans-serif;}
.leaflet-container{background:#E8E4F0 !important;font-family:'Manrope',sans-serif !important}
.leaflet-popup-content-wrapper{background:#fff!important;border:1px solid var(--line)!important;border-radius:12px!important;color:var(--cream)!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important}
.leaflet-popup-content{margin:12px 14px!important;line-height:1.5!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:18px!important;}
.leaflet-control-zoom a{background:#fff!important;color:var(--cream)!important;border-color:var(--line)!important}
.leaflet-control-attribution{background:rgba(255,255,255,.85)!important;color:var(--muted)!important;font-size:9px!important}
</style>

}
function escH(s) {
  if (typeof s !== "string") return String(s || "");
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

}

// ── API ───────────────────────────────────────────────────────────────────────
function safeParseJSON(raw) {
  if (!raw) return null;
  try {
    return JSON.parse(raw);
  } catch (e) {}
  var s = raw.trim();
  s = s.replace(/,\s*"[^"]*$/, '').replace(/:\s*"[^"]*$/, '""').replace(/,\s*$/, '');
  var opens = 0,
    arrs = 0;
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (c === '{') opens++;else if (c === '}') opens--;else if (c === '[') arrs++;else if (c === ']') arrs--;
  }
  while (arrs-- > 0) s += ']';
  while (opens-- > 0) s += '}';
  try {
    return JSON.parse(s);
  } catch (e) {
    return null;
  }
}
async function callClaude(prompt, maxTokens) {
  maxTokens = maxTokens || 1000;
  console.log("callClaude: max_tokens=" + maxTokens + " prompt_len=" + prompt.length);
  var key = getApiKey();
  var headers = {
    "Content-Type": "application/json",
    "anthropic-version": "2023-06-01"
  };
  // key sent via Apps Script proxy
  var res = await fetch("https://script.google.com/macros/s/AKfycbwsZFRa-FF0NHkzxEx2bCGRjQGbfB-FUAdmDU3wywitCjFdudM2hx-7jF4kx7EMMO-3OA/exec", {
    method: "POST",
    headers: headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      messages: [{
        role: "user",
        content: prompt
      }]
    })
  });
  var d = await res.json();
  if (!res.ok) {
    var msg = d && d.error && d.error.message || "HTTP " + res.status;
    if (res.status === 401) throw new Error("API key invalid — check the You tab");
    throw new Error(msg);
  }
  return (d.content || []).map(function (i) {
    return i.text || "";
  }).join("").replace(/```json|```/g, "").trim();
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
function r() {
  var app = document.getElementById("app");
  if (!app) return;
  if (S.cityLoading) {
    app.innerHTML = renderCityLoading();
    return;
  }
  if (!S.started) {
    app.innerHTML = renderOnboard();
    rebuildSidebar();
    return;
  }
  if (!S.profileDone) {
    app.innerHTML = renderProfile();
    rebuildSidebar();
    return;
  }
  if (S.transOpen) {
    app.innerHTML = renderTranslator();
    rebuildSidebar();
    return;
  }
  if (S.showPicker) {
    app.innerHTML = renderPicker();
    rebuildSidebar();
    return;
  }
  app.innerHTML = renderMain();
  var body = document.getElementById("mainBody");
  if (body) body.className = S.tab === "map" ? "map-mode" : "";
  rebuildSidebar();
  bindAfterRender();
}
function rebuildSidebar() {
  var items = document.querySelectorAll('.nav-item[data-tab]');
  items.forEach(function(btn) {
    var k = btn.getAttribute('data-tab');
    btn.classList.toggle('active', S.started && S.profileDone && S.tab === k);
  });
}
function toggleSidebar() { /* sidebar replaced by bottom nav */ }

function startListening() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    S.transHistory.push({
      dir: "in",
      original: "Speech recognition not supported in this browser. Use Chrome on Android or desktop Chrome.",
      translated: "",
      detectedLang: "system"
    });
    r();
    return;
  }
  try {
    var rec = new SR();
    rec.continuous = false;
    rec.interimResults = true;
    rec.lang = "en-US";
    S.recognition = rec;
    S.transListening = true;
    S.transInterim = "";
    rec.onresult = function (e) {
      var interim = "",
        final_ = "";
      for (var i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final_ += e.results[i][0].transcript;else interim += e.results[i][0].transcript;
      }
      S.transInterim = interim;
      if (final_) processTranslation(final_).catch(function(e){ console.error("Translation error:", e); });
      r();
    };
    rec.onend = function () {
      S.transListening = false;
      S.transInterim = "";
      r();
    };
    rec.onerror = function (e) {
      S.transListening = false;
      S.transHistory.push({
        dir: "in",
        original: "Mic error: " + e.error + ". Make sure mic permission is granted.",
        translated: "",
        detectedLang: "system"
      });
      r();
    };
    rec.start();
  } catch (e) {
    S.transListening = false;
    S.transHistory.push({
      dir: "in",
      original: "Could not start microphone: " + e.message,
      translated: "",
      detectedLang: "system"
    });
    r();
  }
}
function stopListening() {
  if (S.recognition) {
    try {
      S.recognition.stop();
    } catch (e) {}
  }
  S.transListening = false;
  r();
}
async function processTranslation(text) {
  S.transListening = false;
  S.transInterim = "";
  r();
  var lang = cityLang();
  try {
    var raw = await callClaude('Detect the language of this text and translate it.\nText: "' + text + '"\nRules: If input is English, translate to ' + lang + ' (direction="out"). If input is ' + lang + ' or other language, translate to English (direction="in").\nRespond ONLY with this JSON: {"detectedLang":"English","direction":"out","translated":"your translation here"}', 300);
    var d = safeParseJSON(raw);
    if (!d) throw new Error("Parse failed");
    S.transHistory.push({
      dir: d.direction || "out",
      original: text,
      translated: d.translated || "(no translation)",
      detectedLang: d.detectedLang || "?"
    });
  } catch (e) {
    S.transHistory.push({
      dir: "out",
      original: text,
      translated: "(translation failed: " + (e.message || e) + ")",
      detectedLang: "?"
    });
  }
  r();
  setTimeout(function () {
    var h = document.getElementById("transHistory");
    if (h) h.scrollTop = h.scrollHeight;
  }, 60);
}
